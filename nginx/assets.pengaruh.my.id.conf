# Nginx Configuration for assets.pengaruh.my.id
# Serves MinIO assets via HTTPS with proper CORS + Range request support (required for Safari/iOS video)

server {
    listen 80;
    listen [::]:80;
    server_name assets.pengaruh.my.id;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name assets.pengaruh.my.id;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/assets.pengaruh.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assets.pengaruh.my.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers (skip X-Frame-Options for media assets)
    add_header X-Content-Type-Options nosniff always;

    # CORS Headers — full coverage including Range (required for Safari video)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, If-None-Match, If-Modified-Since" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Type, ETag, Last-Modified, Accept-Ranges" always;
    add_header Access-Control-Max-Age 3600 always;

    # Logging
    access_log /var/log/nginx/assets.pengaruh.my.id.access.log;
    error_log /var/log/nginx/assets.pengaruh.my.id.error.log;

    # Client body size (for uploads)
    client_max_body_size 100M;

    # CORS preflight — handle OPTIONS at location level (avoid nginx 'if' issues)
    location / {
        # Handle preflight before proxying
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, If-None-Match, If-Modified-Since";
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Type, ETag, Last-Modified, Accept-Ranges";
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # MinIO endpoint (virtual-host style: Host: assets.pengaruh.my.id → bucket "assets")
        proxy_pass http://localhost:9000;

        # Preserve headers for MinIO virtual-host style bucket resolution
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;

        # CRITICAL: Forward Range header to MinIO (required for Safari/iOS video seeking)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Pass conditional request headers (for 304 Not Modified)
        proxy_set_header If-None-Match $http_if_none_match;
        proxy_set_header If-Modified-Since $http_if_modified_since;

        # Buffering: off for large video files (enables streaming)
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts (increase for large video files)
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        # Pass through MinIO's Range response headers
        proxy_hide_header X-Amz-Request-Id;
        proxy_hide_header X-Amz-Id-2;

        # Cache settings for static assets
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
